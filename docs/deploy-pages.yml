# GitHub Pages 配備ワークフロー（案）
#
# このリポジトリでは .github/workflows/ をClaude Codeセッションから書き込めない
# （GitHub Appの権限制約）ため、いったんここに置く。
# 発注者側で .github/workflows/deploy-pages.yml としてコピーし、
# リポジトリ設定 Settings → Pages → Source を「GitHub Actions」にすれば配備される。
#
# ビルドは `npm run build` で release/ に単一HTMLを直接書き出す（vite.config.js参照）。

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: node core/selftest.js ./data
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: release

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
